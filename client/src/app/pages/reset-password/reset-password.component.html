<div class="reset-password-container">
  <h2>Reset Your Password</h2>
  <form (ngSubmit)="resetPassword()">
    <div class="password-wrapper">
      <input
        type="{{ showPassword ? 'text' : 'password' }}"
        [(ngModel)]="newPassword"
        name="newPassword"
        placeholder="New Password"
        required
        [class.invalid]="submitted && !newPassword"
      />
      <button type="button" class="eye-btn" (click)="showPassword = !showPassword" tabindex="-1">
        <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
      </button>
    </div>
    <div *ngIf="submitted && !newPassword" class="error-msg">Password is required</div>
    <button type="submit">Reset Password</button>
  </form>
  <div *ngIf="message" class="reset-message">{{ message }}</div>
  <div *ngIf="showSuccessPopup" class="reset-success-popup-overlay">
    <div class="reset-success-popup">
      <div class="reset-success-message">
        <p>Password reset successful.<br>Please sign in with your new password.</p>
      </div>
      <button (click)="onSuccessOk()">OK</button>
    </div>
  </div>
</div>
